<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Abertura de Chamado por Voz</title>
<style>
  :root {
    --bg: #0b0d12;
    --card: #14171f;
    --card-border: #232733;
    --blue: #2563eb;
    --blue-light: #3b82f6;
    --red: #dc2626;
    --green: #16a34a;
    --text: #f3f4f6;
    --text-dim: #9ca3af;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: radial-gradient(circle at 50% 0%, #171b26 0%, var(--bg) 60%);
    color: var(--text);
  }
  body {
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    width: 100%; max-width: 380px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 32px 24px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    text-align: center;
  }
  .header { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 28px; }
  .logo {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, var(--blue), var(--blue-light));
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px;
  }
  .logo svg { width: 24px; height: 24px; fill: #fff; }
  h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.2px; }
  .subtitle { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }

  .stage { position: relative; display: flex; flex-direction: column; align-items: center; gap: 18px; margin: 8px 0 24px; }

  .mic-wrap { position: relative; width: 156px; height: 156px; display: flex; align-items: center; justify-content: center; }
  .ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid rgba(37,99,235,0.25);
    opacity: 0; transform: scale(0.85);
  }
  .ring.active { animation: ringPulse 1.6s ease-out infinite; }
  .ring.active.r2 { animation-delay: 0.5s; }
  @keyframes ringPulse {
    0%   { opacity: 0.9; transform: scale(0.85); border-color: rgba(220,38,38,0.55); }
    100% { opacity: 0;   transform: scale(1.35); border-color: rgba(220,38,38,0); }
  }

  #btn {
    position: relative; z-index: 2;
    width: 116px; height: 116px; border-radius: 50%; border: none;
    background: linear-gradient(160deg, var(--blue-light), var(--blue));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(37,99,235,0.35);
    transition: transform 0.12s ease, background 0.2s ease, box-shadow 0.2s ease;
  }
  #btn svg { width: 42px; height: 42px; fill: #fff; }
  #btn.recording {
    background: linear-gradient(160deg, #ef4444, var(--red));
    box-shadow: 0 8px 28px rgba(220,38,38,0.45);
    transform: scale(1.04);
  }
  #btn.sending { opacity: 0.65; }

  .bars { display: flex; align-items: center; justify-content: center; gap: 3px; height: 22px; }
  .bars span {
    display: block; width: 3px; border-radius: 2px; background: var(--blue-light);
    height: 6px; opacity: 0.35; transition: height 0.15s ease, opacity 0.15s ease;
  }
  .bars.active span { animation: barMove 0.9s ease-in-out infinite; opacity: 1; background: #f87171; }
  .bars span:nth-child(1) { animation-delay: 0s; }
  .bars span:nth-child(2) { animation-delay: 0.1s; }
  .bars span:nth-child(3) { animation-delay: 0.2s; }
  .bars span:nth-child(4) { animation-delay: 0.3s; }
  .bars span:nth-child(5) { animation-delay: 0.4s; }
  @keyframes barMove {
    0%, 100% { height: 6px; }
    50% { height: 22px; }
  }

  #status { font-size: 13.5px; color: var(--text-dim); min-height: 18px; }

  .result {
    margin-top: 6px; padding: 14px 16px; border-radius: 12px;
    background: #0f1117; border: 1px solid var(--card-border);
    font-size: 13px; color: var(--text-dim); text-align: left;
    display: none; line-height: 1.5;
  }
  .result.show { display: block; }
  .result.ok { border-color: rgba(22,163,74,0.4); }
  .result.ok .result-title { color: var(--green); }
  .result.err { border-color: rgba(220,38,38,0.4); }
  .result.err .result-title { color: var(--red); }
  .result-title { font-size: 12.5px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }

  .hint { margin-top: 20px; font-size: 11.5px; color: #6b7280; }

  #btn:disabled{
    opacity:.4;
    cursor:not-allowed;
    box-shadow:none;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
      </div>
      <h1>Abertura de Chamado por Voz</h1>
      <div class="subtitle">PoC &middot; segure o botão e fale o problema</div>
      <div style="margin-top:20px;width:100%;">
        <input
          id="solicitante"
          type="text"
          placeholder="Nome Completo do solicitante"
          autocomplete="off"
          style="
            width:100%;
            padding:14px;
            border-radius:12px;
            border:1px solid #2c3342;
            background:#0f1117;
            color:#fff;
            font-size:15px;
            outline:none;
          ">
      </div>
    </div>

    <div class="stage">
      <div class="mic-wrap">
        <div class="ring r1" id="ring1"></div>
        <div class="ring r2" id="ring2"></div>
        <button id="btn" aria-label="Segurar para gravar" disabled>
          <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
        </button>
      </div>
      <div class="bars" id="bars">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div id="status">Toque e segure para gravar</div>
    </div>

    <div class="result" id="result">
      <div class="result-title" id="resultTitle"></div>
      <div id="resultBody"></div>
    </div>

    <div class="hint">O áudio é enviado direto para transcrição. Nenhum arquivo fica salvo no aparelho.</div>
  </div>

<script>
  // TODO: ajustar para a URL de producao do seu n8n
  const ENVIAR_URL = "https://connect-n8n.elian.com.br/webhook/chamado-voz/enviar";

  const btn = document.getElementById('btn');
  const solicitante = document.getElementById('solicitante');

  solicitante.addEventListener('input', () => {
    btn.disabled = solicitante.value.trim() === '';
  });

  const ring1 = document.getElementById('ring1');
  const ring2 = document.getElementById('ring2');
  const bars = document.getElementById('bars');
  const statusEl = document.getElementById('status');
  const resultEl = document.getElementById('result');
  const resultTitle = document.getElementById('resultTitle');
  const resultBody = document.getElementById('resultBody');

  let mediaRecorder = null;
  let audioChunks = [];
  let stream = null;
  let mimeType = '';

  function pickMimeType() {
    const candidates = [
      'audio/webm;codecs=opus',
      'audio/webm',
      'audio/mp4',
      'audio/ogg;codecs=opus'
    ];
    for (const c of candidates) {
      if (window.MediaRecorder && MediaRecorder.isTypeSupported(c)) return c;
    }
    return '';
  }

  function setUI(state) {
    btn.classList.remove('recording', 'sending');
    ring1.classList.remove('active');
    ring2.classList.remove('active');
    bars.classList.remove('active');
    if (state === 'recording') {
      btn.classList.add('recording');
      ring1.classList.add('active');
      ring2.classList.add('active');
      bars.classList.add('active');
    } else if (state === 'sending') {
      btn.classList.add('sending');
    }
  }

  function showResult(ok, title, body) {
    resultEl.className = 'result show ' + (ok ? 'ok' : 'err');
    resultTitle.innerText = (ok ? '✅ ' : '⚠️ ') + title;
    resultBody.innerText = body;
  }

  async function iniciarGravacao() {
    if (!solicitante.value.trim()) {
      solicitante.focus();
      alert("Informe o nome do solicitante.");
      return;
    }

    resultEl.className = 'result';
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      statusEl.innerText = 'Permissão de microfone negada.';
      showResult(false, 'Sem acesso ao microfone', err.message);
      return;
    }

    mimeType = pickMimeType();
    audioChunks = [];
    try {
      mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
    } catch (err) {
      statusEl.innerText = 'Não foi possível iniciar a gravação.';
      showResult(false, 'Erro ao gravar', err.message);
      return;
    }

    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = enviarAudio;
    mediaRecorder.start();

    setUI('recording');
    statusEl.innerText = 'Gravando... solte para enviar';
  }

  function pararGravacao() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }
    setUI('sending');
    statusEl.innerText = 'Enviando áudio...';
  }

  function enviarAudio() {
    if (!audioChunks.length) {
      setUI('idle');
      statusEl.innerText = 'Nada gravado. Toque e tente novamente.';
      return;
    }
    const blob = new Blob(audioChunks, { type: mimeType || 'audio/webm' });
    const ext = (mimeType || '').includes('mp4') ? 'm4a' : 'webm';
    const form = new FormData();
    form.append("solicitante", solicitante.value.trim());
    form.append('audio', blob, 'chamado.' + ext);

    fetch(ENVIAR_URL, { method: 'POST', body: form })
      .then(res => res.json())
      .then(data => {
        setUI('idle');
        statusEl.innerText = 'Toque e segure para gravar';
        if (data && data.success) {
          showResult(true, 'Chamado aberto', 'Nº ' + (data.ticketId || data.protocol || '(ver Movidesk)') +
            (data.texto ? '\n\nTranscrição: ' + data.texto : ''));
        } else {
          showResult(false, 'Não foi possível abrir o chamado', (data && data.error) || 'Resposta inesperada do servidor.');
        }
      })
      .catch(err => {
        setUI('idle');
        statusEl.innerText = 'Toque e segure para gravar';
        showResult(false, 'Erro ao enviar', err.message);
      });
  }

  btn.addEventListener('touchstart', (e) => { e.preventDefault(); iniciarGravacao(); }, { passive: false });
  btn.addEventListener('touchend',   (e) => { e.preventDefault(); pararGravacao(); }, { passive: false });
  btn.addEventListener('touchcancel',(e) => { e.preventDefault(); pararGravacao(); }, { passive: false });
  btn.addEventListener('mousedown', iniciarGravacao);
  btn.addEventListener('mouseup', pararGravacao);
  btn.addEventListener('mouseleave', () => { if (mediaRecorder && mediaRecorder.state === 'recording') pararGravacao(); });
</script>
</body>
</html>
